# 长时间 AI 调用时保持连接稳定（完整流程约 3–10 分钟）
# 注意：不要在此设置 port。Streamlit Cloud 固定使用 8501；本地请用 run.bat（8502）。

[server]
maxUploadSize = 50
fileWatcherType = "none"
enableStaticServing = false

[runner]
fastReruns = false
magicEnabled = false

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#2C4A7C"
backgroundColor = "#FAF8F4"
secondaryBackgroundColor = "#F3EFE6"
textColor = "#1F2937"
font = "sans serif"
