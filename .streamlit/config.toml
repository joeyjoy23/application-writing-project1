# 长时间 AI 调用时保持连接稳定（完整流程约 3–10 分钟）
# 注意：不要在此设置 port。Streamlit Cloud 固定使用 8501；本地请用 run.bat（8502）。

[server]
maxUploadSize = 50
fileWatcherType = "none"
enableStaticServing = false

[runner]
fastReruns = false
magicEnabled = false

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[theme]
primaryColor = "#7A6882"
backgroundColor = "#FEFDFB"
secondaryBackgroundColor = "#F8F6F3"
textColor = "#3A3540"
font = "sans serif"
